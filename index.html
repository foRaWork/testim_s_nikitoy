<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
    <div class="container">
        <div class="all g1"></div>
        <div class="all g2"></div>
        <div class="all g3"></div>
        <div class="all g4"></div>
        <div class="all g5"></div>
        <div class="all g6"></div>
        <div class="all g7"></div>
        <div class="all g8"></div>
        <div class="all g9"></div>
        <div class="all g10"></div>
        <div class="all g11"></div>
    </div>
<script>
VANTA.CLOUDS({
  el: "body",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00
})
</script>
<style>
    body{
        display: grid;
        padding:0;
        margin:0;
        width:100%;
        height:100vh;
    }
    .container{
        width:100%;
        height:100vh;
        display: grid;
        grid-template-columns:1fr 1fr 1fr 1fr;
        grid-template-rows:1fr 1fr 1fr 1fr;
    }
    .all{
        backdrop-filter: blur(16px);
        background: rgba(0, 0, 0, 0.3); /* темное "стекло" */
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 30px;
        color: white;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }
    .g2{
        grid-row: span 2;
        grid-column: span 2;
    }
    .g10{
        grid-column: span 3;
    }
    @media screen and (max-width: 768px){
        .container{
            grid-template-columns:1fr;
            grid-template-rows:1fr 2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 2fr ;
        }
        .g2{
             grid-row: span 1;
            grid-column: span 1;
        }
        .g10{
        grid-column: span 1;
    }
    .all{
         border-radius: 10px;
    }
    }
</style>
</body>
</html>
